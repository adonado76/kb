  - category: Manage IT spend
    maturity_level: foundational
    description: Ensure budget owners and IT Leadership (ITLT) manage spend in line with the budget and/or
      the latest forecast
    use_cases:
    - id: U1031
      text: Monitor and adjust investments based on changing needs of the business
      usage_count_note: '3'
      kpis:
      - id: K1141
        type: predefined
        label: '% actual spend vs budget split'
        definition: This is to compare the actual IT spend to budget to understand the variance
        measure: Total IT actual spend, Total IT budget
        reports:
        - Financial Review - FY Outlook
      - id: K1142
        type: predefined
        label: '% actual spend vs forecast'
        definition: This is the compare the actual IT spend to forecast to understand the variance
        measure: Total IT actual spend, Total IT Forecast
        reports:
        - Financial Review - FY Outlook
      - id: K1143
        type: customer_specific
        label: '% capital expenditure vs operational expenditure split'
        definition: This is to compare the operational IT expenditure to capital IT expenditure to understand
          the variance
        measure: Total IT expenditure, Capex, Opex
        reports:
        - Customer Specific Report
      - id: K1144
        type: predefined
        label: IT operational expenditure spend split by spend category (hardware, software, labor, outsourcing,
          disaster recovery and occupancy costs associated)
        definition: 'This is the IT operational expenditure split by spend category which includes: hardware,
          software, labor, outsourcing, disaster recovery and occupancy costs associated'
        measure: Total IT expenditure, Percentage of IT operational expenditure attributed to hardware,
          Percentage of IT operational expenditure attributed to software, Percentage of IT operational
          expenditure attributed to labor, Percentage of IT operational expenditure attributed to outsourcing,
          Percentage of IT operational expenditure attributed to disaster recovery, Percentage of IT operational
          expenditure attributed to occupancy
        reports:
        - Financial Review - Spend Analysis
        - Cost Pool Pivot
      - id: K1145
        type: predefined
