          disaster recovery and occupancy costs associated)
        definition: IT capital expenditure spend split by spend category (hardware, software, labor, outsourcing,
          disaster recovery and occupancy costs associated)
        measure: IT capital expenditure spend split by spend category (hardware, software, labor, outsourcing,
          disaster recovery and occupancy costs associated)
        reports:
        - Financial Review - Capex - Spend Analysis
        - Cost Pool Pivot
      - id: K1146
        type: customer_specific
        label: $ cost saved in the last month/quarter
        definition: This is the total cost savings achieved in the last month/quarter
        measure: Total cost saved in the last month, Total cost saved in the last quarter
        reports:
        - Customer Specific Report
      - id: K1147
        type: predefined
        label: $ overspend in the last month/quarter
        definition: This is the total amount of overspend in the last month/quarter
        measure: Total overspend in the last month, Total overspend in the last quarter
        reports:
